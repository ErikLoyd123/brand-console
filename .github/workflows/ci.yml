# The repo's build gate, sized to what can actually break here (no deploy, no
# test suite — a local-first tool): server typecheck, migrations applying to a
# fresh database (a broken migration bricks every new clone), and the console's
# production build (vite catches bundling/import breakage tsc alone misses).
# This is the status check branch protection points at.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            console/package-lock.json
      # Native deps (better-sqlite3, sharp, node-pty) build from prebuilds;
      # Playwright's browser download is skipped — CI only typechecks.
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      - run: npx tsc --noEmit
      # Fresh-clone integrity: the full migration chain must apply to an empty
      # data/brand.db exactly like it will on a contributor's first checkout.
      - run: npm run db:migrate
      - run: npm ci --prefix console
      # Includes the console typecheck (build = tsc --noEmit && vite build).
      - run: npm run build --prefix console
